<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalpa IoT Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-primary: #0a0e1a;
            --bg-card: rgba(16, 22, 40, 0.8);
            --bg-glass: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.08);
            --text-primary: #e8eaed;
            --text-secondary: #8b92a5;
            --text-dim: #4a5168;
            --accent-blue: #4c9aff;
            --accent-green: #36b37e;
            --accent-orange: #ff8b00;
            --accent-purple: #9b6dff;
            --accent-red: #ff5630;
            --accent-cyan: #00b8d9;
            --glow-blue: rgba(76, 154, 255, 0.15);
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated background gradient */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 20%, rgba(76, 154, 255, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 70% 80%, rgba(155, 109, 255, 0.04) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(0, 184, 217, 0.03) 0%, transparent 50%);
            animation: drift 20s ease-in-out infinite alternate;
            z-index: 0;
        }

        @keyframes drift {
            0% {
                transform: translate(0, 0) rotate(0deg);
            }

            100% {
                transform: translate(-5%, 3%) rotate(3deg);
            }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* ── Header ─────────────────────────────── */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo-sanskrit {
            font-size: 1.2rem;
            color: var(--text-dim);
            margin-left: 0.25rem;
        }

        .subtitle {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 300;
        }

        .connection-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 500;
            border: 1px solid var(--border);
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .connection-badge.connected {
            border-color: rgba(54, 179, 126, 0.3);
            color: var(--accent-green);
        }

        .connection-badge.disconnected {
            border-color: rgba(255, 86, 48, 0.3);
            color: var(--accent-red);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-red);
            transition: background 0.3s;
        }

        .connected .status-dot {
            background: var(--accent-green);
            box-shadow: 0 0 8px var(--accent-green);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        /* ── Stats Row ──────────────────────────── */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.25rem;
            backdrop-filter: blur(10px);
            transition: transform 0.2s, border-color 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.12);
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        .stat-value.blue {
            color: var(--accent-blue);
        }

        .stat-value.green {
            color: var(--accent-green);
        }

        .stat-value.orange {
            color: var(--accent-orange);
        }

        .stat-value.purple {
            color: var(--accent-purple);
        }

        /* ── Sensor Grid ────────────────────────── */
        .section-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .sensor-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .sensor-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .sensor-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--card-accent, var(--accent-blue)), transparent);
            opacity: 0.6;
        }

        .sensor-card.flash {
            border-color: rgba(76, 154, 255, 0.4);
            box-shadow: 0 0 20px var(--glow-blue);
        }

        .sensor-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .sensor-name {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .sensor-id {
            font-size: 0.7rem;
            color: var(--text-dim);
            font-family: 'JetBrains Mono', monospace;
        }

        .sensor-value {
            font-size: 2.5rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            margin-bottom: 0.5rem;
            transition: color 0.3s;
        }

        .sensor-unit {
            font-size: 1rem;
            font-weight: 400;
            color: var(--text-secondary);
            margin-left: 0.25rem;
        }

        .sensor-sparkline {
            height: 40px;
            display: flex;
            align-items: flex-end;
            gap: 2px;
        }

        .spark-bar {
            flex: 1;
            min-width: 3px;
            border-radius: 2px 2px 0 0;
            background: var(--accent-blue);
            opacity: 0.4;
            transition: height 0.3s ease;
        }

        .spark-bar:last-child {
            opacity: 1;
        }

        /* ── Message Log ────────────────────────── */
        .log-container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
            max-height: 300px;
            overflow: hidden;
        }

        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .log-entries {
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 0.75rem;
            line-height: 1.8;
            color: var(--text-secondary);
            max-height: 220px;
            overflow-y: auto;
        }

        .log-entries::-webkit-scrollbar {
            width: 4px;
        }

        .log-entries::-webkit-scrollbar-track {
            background: transparent;
        }

        .log-entries::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        .log-entry {
            padding: 0.15rem 0;
            animation: fadeIn 0.3s ease;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .log-time {
            color: var(--text-dim);
        }

        .log-sensor {
            color: var(--accent-cyan);
        }

        .log-value {
            color: var(--accent-green);
            font-weight: 500;
        }

        .log-protocol {
            color: var(--accent-purple);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── Flow Diagram ───────────────────────── */
        .flow-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 1rem;
            margin-bottom: 2rem;
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .flow-node {
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            font-weight: 500;
            font-size: 0.8rem;
        }

        .flow-node.protocol {
            background: rgba(76, 154, 255, 0.12);
            color: var(--accent-blue);
            border: 1px solid rgba(76, 154, 255, 0.2);
        }

        .flow-node.engine {
            background: rgba(155, 109, 255, 0.12);
            color: var(--accent-purple);
            border: 1px solid rgba(155, 109, 255, 0.2);
        }

        .flow-node.output {
            background: rgba(54, 179, 126, 0.12);
            color: var(--accent-green);
            border: 1px solid rgba(54, 179, 126, 0.2);
        }

        .flow-arrow {
            color: var(--text-dim);
            font-size: 1.2rem;
            animation: arrowPulse 1.5s infinite;
        }

        @keyframes arrowPulse {

            0%,
            100% {
                opacity: 0.3;
            }

            50% {
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <div>
                    <span class="logo">KALPA</span>
                    <span class="logo-sanskrit">कल्प</span>
                    <div class="subtitle">IoT Sensor Dashboard — Powered by Kalpa Protocol Bridge</div>
                </div>
            </div>
            <div class="connection-badge disconnected" id="connectionBadge">
                <div class="status-dot"></div>
                <span id="connectionText">Connecting...</span>
            </div>
        </div>

        <!-- Flow diagram -->
        <div class="flow-bar">
            <span class="flow-node protocol">🏭 Sensors (HTTP POST)</span>
            <span class="flow-arrow">→</span>
            <span class="flow-node engine">⚡ Kalpa Engine</span>
            <span class="flow-arrow">→</span>
            <span class="flow-node output">📡 SSE Stream</span>
            <span class="flow-arrow">→</span>
            <span class="flow-node output">🖥️ This Dashboard</span>
        </div>

        <!-- Stats row -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-label">Messages Received</div>
                <div class="stat-value blue" id="totalMessages">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Active Sensors</div>
                <div class="stat-value green" id="activeSensors">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Messages / sec</div>
                <div class="stat-value orange" id="msgPerSec">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Uptime</div>
                <div class="stat-value purple" id="uptime">0s</div>
            </div>
        </div>

        <!-- Sensor cards -->
        <div class="section-title">Live Sensors</div>
        <div class="sensor-grid" id="sensorGrid"></div>

        <!-- Log -->
        <div class="log-container">
            <div class="log-header">
                <div class="section-title" style="margin:0">Message Log</div>
            </div>
            <div class="log-entries" id="logEntries"></div>
        </div>
    </div>

    <script>
        // ── State ──────────────────────────────────
        const sensors = {};
        let totalMessages = 0;
        let recentMessages = [];
        const startTime = Date.now();

        const COLORS = {
            'temp-01': '#4c9aff',
            'temp-02': '#ff8b00',
            'humid-01': '#00b8d9',
            'pressure-01': '#9b6dff',
            'light-01': '#ffab00',
            'co2-01': '#ff5630',
        };

        // ── SSE Connection ─────────────────────────
        function connect() {
            const es = new EventSource('http://localhost:4001/stream');

            es.onopen = () => {
                document.getElementById('connectionBadge').className = 'connection-badge connected';
                document.getElementById('connectionText').textContent = 'SSE Connected';
            };

            es.onerror = () => {
                document.getElementById('connectionBadge').className = 'connection-badge disconnected';
                document.getElementById('connectionText').textContent = 'Reconnecting...';
            };

            es.addEventListener('message', (event) => {
                try {
                    const data = JSON.parse(event.data);
                    handleSensorData(data);
                } catch (e) { }
            });
        }

        // ── Handle incoming sensor data ────────────
        function handleSensorData(data) {
            totalMessages++;
            recentMessages.push(Date.now());

            const id = data.sensorId;
            if (!sensors[id]) {
                sensors[id] = {
                    name: data.name,
                    unit: data.unit,
                    value: data.value,
                    history: [],
                };
            }

            sensors[id].value = data.value;
            sensors[id].history.push(data.value);
            if (sensors[id].history.length > 30) sensors[id].history.shift();
            sensors[id].lastUpdate = Date.now();

            renderSensorCard(id);
            addLogEntry(data);
            updateStats();
        }

        // ── Render a sensor card ───────────────────
        function renderSensorCard(id) {
            const s = sensors[id];
            let card = document.getElementById(`sensor-${id}`);

            if (!card) {
                card = document.createElement('div');
                card.id = `sensor-${id}`;
                card.className = 'sensor-card';
                card.style.setProperty('--card-accent', COLORS[id] || '#4c9aff');
                document.getElementById('sensorGrid').appendChild(card);
            }

            const history = s.history;
            const min = Math.min(...history);
            const max = Math.max(...history);
            const range = max - min || 1;

            const sparkBars = history.map((v, i) => {
                const height = 8 + ((v - min) / range) * 32;
                const color = COLORS[id] || '#4c9aff';
                return `<div class="spark-bar" style="height:${height}px; background:${color}"></div>`;
            }).join('');

            card.innerHTML = `
                <div class="sensor-header">
                    <div>
                        <div class="sensor-name">${s.name}</div>
                        <div class="sensor-id">${id}</div>
                    </div>
                </div>
                <div class="sensor-value" style="color:${COLORS[id] || '#4c9aff'}">
                    ${s.value}<span class="sensor-unit">${s.unit}</span>
                </div>
                <div class="sensor-sparkline">${sparkBars}</div>
            `;

            // Flash effect
            card.classList.add('flash');
            setTimeout(() => card.classList.remove('flash'), 300);
        }

        // ── Add log entry ──────────────────────────
        function addLogEntry(data) {
            const log = document.getElementById('logEntries');
            const time = new Date().toLocaleTimeString('en-US', { hour12: false });
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span class="log-time">${time}</span>  <span class="log-protocol">HTTP→SSE</span>  <span class="log-sensor">${data.name}</span>  <span class="log-value">${data.value}${data.unit}</span>`;

            log.insertBefore(entry, log.firstChild);

            // Keep max 50 entries
            while (log.children.length > 50) {
                log.removeChild(log.lastChild);
            }
        }

        // ── Update stats ───────────────────────────
        function updateStats() {
            document.getElementById('totalMessages').textContent = totalMessages;
            document.getElementById('activeSensors').textContent = Object.keys(sensors).length;

            // Messages per second (last 5s)
            const now = Date.now();
            recentMessages = recentMessages.filter(t => now - t < 5000);
            const mps = (recentMessages.length / 5).toFixed(1);
            document.getElementById('msgPerSec').textContent = mps;

            // Uptime
            const elapsed = Math.floor((now - startTime) / 1000);
            const mins = Math.floor(elapsed / 60);
            const secs = elapsed % 60;
            document.getElementById('uptime').textContent = mins > 0 ? `${mins}m ${secs}s` : `${secs}s`;
        }

        // Update stats every second
        setInterval(updateStats, 1000);

        // Connect
        connect();
    </script>
</body>

</html>
